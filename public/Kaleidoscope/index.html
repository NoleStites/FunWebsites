<!DOCTYPE html>
<html>
    <head>
        <title>Kaleidoscope</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="./styles.css" rel="stylesheet" />
        <script src="./script.js" defer></script>
    </head>
    <body>
        <div id="box">
            <div id="innerBox">
                <div id="color1" class="colorSquare"></div>
                <div id="color2" class="colorSquare"></div>
                <div id="color3" class="colorSquare"></div>
                <div id="color4" class="colorSquare"></div>
                <div id="color5" class="colorSquare"></div>
                <div id="color6" class="colorSquare"></div>
                <div id="color7" class="colorSquare"></div>
                <div id="color8" class="colorSquare"></div>
            </div>
            <div id="shadow" class="topSquare"></div>
        </div>
        <div id="inputBox">
            <label for="circleSizeInput">
                Circle size:
                <input id="circleSizeInput" type="range" min="1" max="10" step="1" value="4" onchange="changeCircleSize()">
            </label>
            <label for="animationSize">
                Speed:
                <input id="animationSize" type="range" min="0.2" max="5" step="0.1" value="1" onchange="changeSpeed()">
            </label>
            <label for="animationDelay">
                Delay:
                <input id="animationDelay" type="range" min="0" max="1" step="0.1" value="0.1" onchange="changeDelay()">
            </label>
        </div>
    </body>
</html>
