<!DOCTYPE html>
<html>
    <head>
        <title>Kaleidoscope</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="./styles.css" rel="stylesheet" />
        <link rel="icon" type="image/x-icon" href="./rainbowFav.svg">
        <script src="./script.js" defer></script>
    </head>
    <body>
        <div id="box">
            <div id="innerBox"></div>
            <div id="shadow" class="topSquare"></div>
        </div>
        <div id="inputBox">
            <label for="circleSizeInput">
                Circle size:
                <input id="circleSizeInput" type="range" min="1" max="10" step="1" value="4" onchange="changeCircleSize()">
            </label>
            <label for="animationSpeed">
                Speed:
                <input id="animationSpeed" type="range" min="0.2" max="5" step="0.1" value="1" onchange="changeSpeed()">
            </label>
            <label for="animationDelay">
                Delay:
                <input id="animationDelay" type="range" min="0" max="1" step="0.1" value="0.1" onchange="changeDelay()">
            </label>
            <label for="numCircles">
                Number of Circles:
                <input id="numCircles" type="number" min="1" max="100" step="1" value="20" placeholder="1 - 100" onchange="changeNumCircles()">
            </label>
            <button id="darkLightMode">Dark Mode</button>
        </div> 
    </body>
</html>
