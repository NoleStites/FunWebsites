<!DOCTYPE html>
<html>
    <head>
        <title>Color Splotch</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="./splotch.svg">
        <link href="./styles.css" rel="stylesheet" />
        <script src="./script.js" defer></script>
    </head>
    <body class="flexCenter">
        <main id="appContainer">
            <div id="canvasBox">
                <div id="canvasMask">
                    <div id="mover"></div>
                </div>
                <canvas id="splotchCanvas" width="10" height="10"></canvas>
            </div>

            <div id="controls">
                <div class="controlRow">
                    <label for="resInputX">Resolution</label>
                    <div class="inputGroup">
                        <input id="resInputX" type="number" min="2" max="100" value="50">
                        <span class="separator">×</span>
                        <input id="resInputY" type="number" min="2" max="100" value="50">
                    </div>
                </div>
                
                <div class="controlRow">
                    <label>Blend</label>
                    <div class="sliderGroup">
                        <span class="sliderLabel">More</span>
                        <input id="blendInput" type="range" min="1" step="1" max="30">
                        <span class="sliderLabel">Less</span>
                    </div>
                </div>

                <div class="controlRow">
                    <label for="splotchCount">Colors</label>
                    <div class="inputGroup">
                        <input id="splotchCount" type="number" min="1" max="10" value="2">
                        <button id="randomizeBtn">Randomize</button>
                    </div>
                </div>
            </div>

            <div id="centerList">
                <!-- <div class="centerBox">
                    <input type="color">
                    <div class="point pill">
                        <span>(</span>
                        <input type="number" class="inputX">
                        <span class="comma">,</span>
                        <input type="number" class="inputY">
                        <span>)</span>
                    </div>
                </div> -->
            </div>
            <footer id="appFooter">
                <span>v1.0.0</span>
            </footer>
        </main>
    </body>
</html>
